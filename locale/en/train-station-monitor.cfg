[mod-name]
train-station-monitor=Train Station Monitor

[controls]
tod-toggle-dashboard=Toggle Train Station Monitor

[tod]
# --- window ---
title=Train Station Monitor
subtitle=__1__ resources · __2__ stations
button-tooltip=Train Station Monitor\nClick to open the live rail network overview.

# --- column headers ---
col-resource=Resource
col-load=Load
col-unload=Unload
col-stations=Stations
col-present=Present
col-saturation=Queue
col-disabled=Disabled
col-wait-time=Avg wait
col-controls=

# --- column tooltips ---
tt-resource=The item or fluid this station group moves, taken from the [img] tag in the station name.
tt-load=Number of stations that LOAD this resource (send it out).
tt-unload=Number of stations that UNLOAD this resource (receive it).
tt-stations=Total stations in this group (load + unload).
tt-present=Stations that currently have a train being served at the platform.
tt-saturation=Trains waiting / total that can wait across the group. A full green bar means the group is well supplied. An empty grey bar means it is starved.
tt-disabled=Stations currently disabled (by circuit condition, train limit 0, or via this dashboard).
tt-wait-time=Average time a train spent waiting before being served, over the last few minutes.

# --- health / value tooltips ---
tt-value-present=__1__ / __2__ stations have a train present right now.
tt-value-queue=__1__ trains waiting of __2__ that can wait.
tt-value-disabled=__1__ of __2__ stations are disabled.

# --- expanded station rows ---
station-active=Active
station-full=Full
station-queue=Queueing
station-ready=Ready
station-idle=Ready
station-disabled=Disabled
station-no-path=No path

# --- per-station control tooltips ---
tt-zoom=Zoom the map to this station.
tt-show-train=Open the train currently stopped here (or the next one scheduled).
tt-toggle-enabled=Enable / disable this station. Disabling sets its train limit to 0 so no new trains are dispatched.
tt-open-map=Ping this station on the map for everyone.

# --- toolbar ---
sort-label=Sort
sort-waiting=Least saturated
sort-saturated=Most saturated
sort-idle=Most idle
sort-alpha=Alphabetical
sort-stations=Station count
sort-disabled=Disabled first
sort-resource=Resource name
filter-load-only=Load only
filter-unload-only=Unload only
filter-hide-healthy=Hide saturated
filter-only-queues=Only queues
filter-only-disabled=Only disabled
filter-heatmap=Heatmap
tt-heatmap=Overlay a supply heatmap on the map — one coloured circle per station, cool (trains flowing or waiting) to hot (starved: long gap until the next train).
tt-heatmap-focus=Enable heatmap and focus the hottest station on your current surface.
heatmap-legend-cool=Cool
heatmap-legend-warm=Warm
heatmap-legend-hot=Hot
heatmap-no-hotspot=No visible stations on this surface.
heatmap-banner-on=Heatmap overlay active (map circles visible on your current surface).
heatmap-banner-off=Heatmap overlay disabled.
throughput-none=No throughput yet.
search-placeholder=Search resource…

# --- throughput graph ---
throughput-summary=Throughput (10m live):  __1__/min avg · peak __2__ · now __3__
tt-throughput=Trains served (departed a platform) per minute over the last 10-minute live window (includes the current partial minute).
monitor-summary=Monitor: present __1__ · queued __2__ · disabled __3__ / __4__
tt-monitor=Live station health for this resource group.
monitor-present=Stations with a train present: __1__ / __2__
monitor-queue=Queued trains: __1__ / __2__ capacity
monitor-disabled=Disabled stations: __1__ / __2__
tt-train-contents=Current contents of the stopped loading train. Total: __1__ (items __2__, fluids __3__). The icon switches to the largest cargo or fluid stack when a train is present.
tt-train-content-chip=Type __1__ | Name __2__ | Count __3__

# --- no-provider alerts ---
alerts-badge=⚠ __1__
alert-no_provider=__1__ has no load station — nothing provides this resource.
alert-providers_disabled=__1__ has no available provider — all __2__ load stations are disabled.
heatmap-on=Heatmap ON
heatmap-off=Heatmap OFF

# --- misc ---
empty=No train stops discovered yet. Any train stop will appear here — just build one.
empty-filtered=No stations match the current filters.
